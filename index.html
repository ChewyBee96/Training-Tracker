<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Growth Tracker</title>
<meta name="theme-color" content="#0e151f">
<link rel="manifest" href="./manifest.json">
<!-- iOS standalone support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Growth">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" href="./icon-192.png">

<script>
// Standalone storage shim: emulate the chat host's window.storage using localStorage,
// so the same app code runs unchanged on a real device, fully offline.
window.storage = {
  async get(key){
    const v = localStorage.getItem('gt_'+key);
    return v === null ? null : { key, value: v };
  },
  async set(key, value){
    localStorage.setItem('gt_'+key, value);
    return { key, value };
  },
  async delete(key){
    localStorage.removeItem('gt_'+key);
    return { key, deleted: true };
  }
};
</script>
</head>
<body>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap');

  :root{
    --bg:#0e151f;
    --panel:#16202e;
    --panel2:#1d2a3a;
    --line:#2a3a4f;
    --navy:#1f3a5f;
    --accent:#3d8bff;
    --accent2:#2e75b6;
    --ink:#eaf1f9;
    --mut:#8aa0b8;
    --good:#27c08a;
    --gold:#e0a83b;
    --bad:#e0573b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);}
  #app{
    font-family:'Barlow',system-ui,sans-serif;
    color:var(--ink);
    max-width:520px;margin:0 auto;
    min-height:100vh;
    padding:0 0 90px;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(61,139,255,.10), transparent 60%),
      var(--bg);
  }

  /* header */
  .hd{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg, rgba(14,21,31,.96), rgba(14,21,31,.82));
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:16px 18px 12px;
  }
  .hd h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;letter-spacing:.5px;
    margin:0;font-size:22px;text-transform:uppercase;
    display:flex;align-items:center;gap:9px;
  }
  .hd h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
  .hd .sub{color:var(--mut);font-size:12.5px;margin-top:2px;letter-spacing:.3px;}

  .wrap{padding:16px 14px 0;}

  /* session banner */
  .banner{
    background:linear-gradient(135deg, var(--navy), #11293f);
    border:1px solid var(--line);
    border-radius:16px;padding:16px 16px;
    position:relative;overflow:hidden;
    box-shadow:0 8px 28px rgba(0,0,0,.35);
  }
  .banner:before{
    content:"";position:absolute;right:-30px;top:-30px;
    width:140px;height:140px;border-radius:50%;
    background:radial-gradient(circle,rgba(61,139,255,.25),transparent 70%);
  }
  .banner .tag{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700;}
  .banner .big{
    font-family:'Barlow Condensed',sans-serif;font-weight:700;
    font-size:30px;line-height:1.05;margin:4px 0 2px;text-transform:uppercase;
  }
  .banner .bench{
    display:inline-flex;align-items:center;gap:7px;margin-top:9px;
    background:rgba(224,168,59,.14);border:1px solid rgba(224,168,59,.4);
    color:var(--gold);font-weight:600;font-size:13.5px;
    padding:6px 11px;border-radius:999px;
  }
  .banner .meta{color:var(--mut);font-size:12.5px;margin-top:10px;}

  /* exercise card */
  .ex{
    background:var(--panel);border:1px solid var(--line);
    border-radius:15px;margin-top:13px;overflow:hidden;
  }
  .ex.done{border-color:rgba(39,192,138,.45);}
  .ex .top{
    display:flex;align-items:center;gap:11px;
    padding:13px 14px;cursor:pointer;
  }
  .ex .num{
    flex:0 0 30px;height:30px;border-radius:9px;
    background:var(--panel2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--accent);font-size:16px;
  }
  .ex.done .num{background:var(--good);border-color:var(--good);color:#06281c;}
  .ex .name{flex:1;min-width:0;}
  .ex .name b{font-weight:600;font-size:16px;display:block;letter-spacing:.2px;}
  .ex .name span{color:var(--mut);font-size:12px;}
  .ex .chev{color:var(--mut);font-size:13px;transition:transform .2s;}
  .ex.open .chev{transform:rotate(90deg);}

  .body{display:none;padding:0 14px 14px;}
  .ex.open .body{display:block;}

  /* last time strip */
  .last{
    background:linear-gradient(90deg, rgba(46,117,182,.16), rgba(46,117,182,.04));
    border:1px solid rgba(46,117,182,.34);
    border-radius:11px;padding:9px 11px;margin-bottom:12px;
  }
  .last .lab{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent2);font-weight:700;}
  .last .vals{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .last .pill{
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:4px 9px;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;
  }
  .last .none{color:var(--mut);font-size:13px;font-style:italic;}

  /* set rows */
  .setrow{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .setrow .sl{
    flex:0 0 46px;font-family:'Barlow Condensed',sans-serif;font-weight:600;
    color:var(--mut);font-size:13px;text-transform:uppercase;letter-spacing:.5px;
  }
  .fld{flex:1;position:relative;}
  .fld input{
    width:100%;background:var(--panel2);border:1.5px solid var(--line);
    color:var(--ink);border-radius:10px;padding:13px 10px 13px 12px;
    font-size:16px;font-weight:600;font-family:'Barlow',sans-serif;
    text-align:center;font-variant-numeric:tabular-nums;outline:none;
    transition:border-color .15s;
  }
  .fld input:focus{border-color:var(--accent);}
  .fld .u{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    color:var(--mut);font-size:11px;pointer-events:none;font-weight:500;
  }
  .setrow .x{
    flex:0 0 16px;text-align:center;color:var(--mut);font-weight:700;font-size:14px;
  }
  .beat{flex:0 0 26px;text-align:center;font-size:15px;}

  .addset{
    width:100%;background:transparent;border:1.5px dashed var(--line);
    color:var(--mut);border-radius:10px;padding:10px;font-size:13.5px;font-weight:600;
    font-family:'Barlow',sans-serif;cursor:pointer;margin-top:2px;letter-spacing:.3px;
  }
  .addset:active{background:var(--panel2);}

  /* finish bar */
  .finishbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    max-width:520px;margin:0 auto;padding:12px 14px;
    background:linear-gradient(0deg, var(--bg) 60%, transparent);
  }
  .btn{
    width:100%;border:none;border-radius:13px;padding:16px;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
    letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 8px 24px rgba(61,139,255,.3);
  }
  .btn:active{transform:translateY(1px);}
  .btn.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);box-shadow:none;}

  /* tabs */
  .tabs{display:flex;gap:8px;padding:14px 14px 0;}
  .tab{
    flex:1;text-align:center;padding:10px;border-radius:11px;
    background:var(--panel);border:1px solid var(--line);color:var(--mut);
    font-weight:600;font-size:13.5px;cursor:pointer;letter-spacing:.3px;
  }
  .tab.on{background:var(--navy);color:#fff;border-color:var(--accent2);}

  /* history */
  .hcard{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-top:12px;
  }
  .hcard .hh{display:flex;justify-content:space-between;align-items:baseline;}
  .hcard .hh b{font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:.5px;}
  .hcard .hh .d{color:var(--mut);font-size:12px;}
  .hcard .hb{color:var(--mut);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;color:var(--gold);}
  .hrow{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;border-top:1px solid var(--line);margin-top:7px;}
  .hrow span:first-child{color:var(--mut);}
  .hrow span:last-child{font-weight:600;font-variant-numeric:tabular-nums;}
  .empty{text-align:center;color:var(--mut);padding:50px 20px;font-size:14px;}
  .empty .em{font-size:30px;display:block;margin-bottom:10px;opacity:.6;}

  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--good);color:#06281c;font-weight:700;font-size:14px;
    padding:11px 20px;border-radius:999px;opacity:0;transition:all .3s;z-index:50;
    box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .resetwrap{padding:20px 14px 0;text-align:center;}
  .resetwrap button{background:none;border:none;color:var(--mut);font-size:12px;text-decoration:underline;cursor:pointer;}

  /* RIR cue */
  .rir{
    display:flex;align-items:center;gap:7px;
    border-radius:10px;padding:8px 11px;margin-bottom:12px;
    font-size:12.5px;font-weight:600;letter-spacing:.2px;
  }
  .rir .ic{font-size:13px;}
  .rir-hi{background:rgba(224,168,59,.13);border:1px solid rgba(224,168,59,.34);color:var(--gold);}
  .rir-mid{background:rgba(61,139,255,.13);border:1px solid rgba(61,139,255,.34);color:var(--accent);}
  .rir-go{background:rgba(224,87,59,.13);border:1px solid rgba(224,87,59,.34);color:#ff8161;}

  /* progress / charts */
  .pickrow{display:flex;gap:7px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch;}
  .pickrow::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--mut);
    border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .chip.on{background:var(--navy);color:#fff;border-color:var(--accent2);}
  .chartcard{
    background:var(--panel);border:1px solid var(--line);border-radius:15px;
    padding:15px 14px 12px;margin-top:4px;
  }
  .chartcard .ct{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:.4px;}
  .chartcard .cs{color:var(--mut);font-size:12px;margin-bottom:10px;}
  .chartcard svg{width:100%;height:auto;display:block;}
  .stat{display:flex;gap:10px;margin-top:12px;}
  .stat .s{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center;}
  .stat .s .v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .stat .s .v.up{color:var(--good);}
  .stat .s .l{color:var(--mut);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
</style>

<div id="app">
  <div class="hd">
    <h1><span class="dot"></span>Growth Tracker</h1>
    <div class="sub">Full-body hypertrophy · beat last time</div>
  </div>

  <div class="tabs">
    <div class="tab on" id="tab-train" onclick="switchTab('train')">Today</div>
    <div class="tab" id="tab-prog" onclick="switchTab('prog')">Progress</div>
    <div class="tab" id="tab-hist" onclick="switchTab('hist')">History</div>
  </div>

  <div id="view-train">
    <div class="wrap">
      <div class="banner">
        <div class="tag">Next Session</div>
        <div class="big" id="sessTitle">Session 1</div>
        <div class="bench" id="benchTag">🏋️ Flat seated bench</div>
        <div class="meta" id="sessMeta">Tap an exercise to log your sets · leave 1–2 reps in the tank on big lifts</div>
      </div>
      <div id="exList"></div>
    </div>
    <div class="finishbar">
      <button class="btn" onclick="finishSession()">Finish &amp; Save Session</button>
    </div>
  </div>

  <div id="view-prog" style="display:none;">
    <div class="wrap">
      <div class="pickrow" id="progPicker"></div>
      <div id="progChart"></div>
    </div>
  </div>

  <div id="view-hist" style="display:none;">
    <div class="wrap"><div id="histList"></div></div>
    <div class="resetwrap"><button onclick="resetAll()">Clear all history</button></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const EXERCISES = [
  {id:'hex',  name:'Hex-Bar Deadlift',   target:'3 × 8',     sets:3, unit:'kg',     rir:2},
  {id:'bench',name:'BENCH_DYNAMIC',      target:'3 × 8–10',  sets:3, unit:'kg',     rir:2},
  {id:'ohp',  name:'Shoulder Press',     target:'3 × 8–10',  sets:3, unit:'kg',     rir:2},
  {id:'pull', name:'Pull-Up / Pulldown', target:'3 × 8–12',  sets:3, unit:'reps/kg',rir:1},
  {id:'row',  name:'Chest-Supported Row',target:'3 × 10–12', sets:3, unit:'kg',     rir:1},
  {id:'curl', name:'Leg Curl',           target:'3 × 12–15', sets:3, unit:'kg',     rir:1},
  {id:'calf', name:'Calf Press',         target:'3 × 15',    sets:3, unit:'kg',     rir:0},
  {id:'bicep',name:'Dumbbell Curl',      target:'2 × 10–12', sets:2, unit:'kg',     rir:0},
  {id:'dip',  name:'Dips / Pushdown',    target:'2 × 10–12', sets:2, unit:'reps/kg',rir:0},
];

// RIR = reps in reserve. 2 = big lifts keep a buffer; 0 = take final set to failure (low-risk moves).
function rirCue(rir){
  if(rir>=2) return {txt:'Stop ~2 reps short of failure', cls:'rir-hi'};
  if(rir===1) return {txt:'Push to ~1 rep short of failure', cls:'rir-mid'};
  return {txt:'Last set → take to failure', cls:'rir-go'};
}

let sessionNum = 1;       // 1-indexed; odd = A (flat), even = B (incline)
let history = [];         // array of saved sessions
let current = {};         // {exId: [{w,r},...]}
let lastByEx = {};        // {exId: {sets:[{w,r}], sessionNum, date}}
let openEx = null;
let progSel = 'hex';      // exercise currently shown on Progress tab

function benchName(n){ return (n % 2 === 1) ? 'Flat seated bench' : 'Incline dumbbell press'; }
function benchShort(n){ return (n % 2 === 1) ? 'Flat seated bench' : 'Incline DB press'; }
function exName(ex){ return ex.name === 'BENCH_DYNAMIC' ? ('Bench — ' + benchShort(sessionNum)) : ex.name; }

async function load(){
  try{
    const meta = await window.storage.get('meta');
    if(meta){ const m = JSON.parse(meta.value); sessionNum = m.sessionNum || 1; }
  }catch(e){}
  try{
    const h = await window.storage.get('history');
    if(h){ history = JSON.parse(h.value) || []; }
  }catch(e){}
  // build lastByEx from most recent occurrence of each exercise
  lastByEx = {};
  for(const s of history){
    for(const exId in s.logs){
      const filled = s.logs[exId].filter(x=>x.w!==''||x.r!=='');
      if(filled.length){ lastByEx[exId] = {sets:s.logs[exId], sessionNum:s.sessionNum, date:s.date}; }
    }
  }
  current = {};
  render();
}

function render(){
  document.getElementById('sessTitle').textContent = 'Session ' + sessionNum;
  const isA = sessionNum % 2 === 1;
  const bt = document.getElementById('benchTag');
  bt.textContent = (isA?'🏋️ ':'💪 ') + benchName(sessionNum);
  renderExercises();
  renderHistory();
  renderProgress();
}

function renderExercises(){
  const list = document.getElementById('exList');
  list.innerHTML = '';
  EXERCISES.forEach((ex,i)=>{
    if(!current[ex.id]) current[ex.id] = Array.from({length:ex.sets},()=>({w:'',r:''}));
    const sets = current[ex.id];
    const done = sets.some(s=>s.w!==''||s.r!=='');
    const isOpen = openEx === ex.id;

    const last = lastByEx[ex.id];
    let lastHtml = '<span class="none">No previous data — set your baseline</span>';
    if(last){
      const pills = last.sets.filter(s=>s.w!==''||s.r!=='').map(s=>{
        const w = s.w!==''? s.w : '–';
        const r = s.r!==''? s.r : '–';
        return `<span class="pill">${w}<span style="color:var(--mut)">×</span>${r}</span>`;
      }).join('');
      lastHtml = pills || lastHtml;
    }

    const setRows = sets.map((s,si)=>{
      let beat = '';
      if(last){
        const ls = last.sets[si];
        if(ls && (s.w!==''&&s.r!=='') && (ls.w!==''&&ls.r!=='')){
          const now = (parseFloat(s.w)||0)*(parseFloat(s.r)||0);
          const then = (parseFloat(ls.w)||0)*(parseFloat(ls.r)||0);
          beat = now>then ? '🔼' : (now===then ? '➖' : '🔽');
        }
      }
      return `<div class="setrow">
        <div class="sl">Set ${si+1}</div>
        <div class="fld"><input inputmode="decimal" placeholder="wt" value="${s.w}"
          onchange="upd('${ex.id}',${si},'w',this.value)"><span class="u">${ex.unit.split('/')[0]}</span></div>
        <div class="x">×</div>
        <div class="fld"><input inputmode="numeric" placeholder="reps" value="${s.r}"
          onchange="upd('${ex.id}',${si},'r',this.value)"><span class="u">reps</span></div>
        <div class="beat">${beat}</div>
      </div>`;
    }).join('');

    const cue = rirCue(ex.rir);
    const card = document.createElement('div');
    card.className = 'ex' + (done?' done':'') + (isOpen?' open':'');
    card.innerHTML = `
      <div class="top" onclick="toggle('${ex.id}')">
        <div class="num">${done?'✓':(i+1)}</div>
        <div class="name"><b>${exName(ex)}</b><span>Target ${ex.target}</span></div>
        <div class="chev">▶</div>
      </div>
      <div class="body">
        <div class="rir ${cue.cls}"><span class="ic">🎯</span>${cue.txt}</div>
        <div class="last">
          <div class="lab">Last time${last?' · S'+last.sessionNum:''} — beat this</div>
          <div class="vals">${lastHtml}</div>
        </div>
        ${setRows}
        <button class="addset" onclick="addSet('${ex.id}')">+ Add set</button>
      </div>`;
    list.appendChild(card);
  });
}

function toggle(id){ openEx = (openEx===id)?null:id; renderExercises(); }
function upd(id,si,k,v){ current[id][si][k]=v.trim(); renderExercises(); }
function addSet(id){ current[id].push({w:'',r:''}); renderExercises(); }

async function finishSession(){
  const anything = Object.values(current).some(sets=>sets.some(s=>s.w!==''||s.r!==''));
  if(!anything){ toast('Log at least one set first'); return; }
  const rec = {
    sessionNum,
    bench: benchName(sessionNum),
    date: new Date().toISOString(),
    logs: JSON.parse(JSON.stringify(current))
  };
  history.unshift(rec);
  sessionNum += 1;
  try{
    await window.storage.set('history', JSON.stringify(history));
    await window.storage.set('meta', JSON.stringify({sessionNum}));
  }catch(e){ toast('Save failed — try again'); return; }
  openEx = null;
  await load();
  toast('Session saved 💪');
  switchTab('train');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderHistory(){
  const el = document.getElementById('histList');
  if(!history.length){
    el.innerHTML = `<div class="empty"><span class="em">📈</span>No sessions logged yet.<br>Finish your first session and it'll show here.</div>`;
    return;
  }
  el.innerHTML = history.map(s=>{
    const d = new Date(s.date);
    const ds = d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'}) +
               ' · ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    const rows = EXERCISES.map(ex=>{
      const sets = (s.logs[ex.id]||[]).filter(x=>x.w!==''||x.r!=='');
      if(!sets.length) return '';
      const txt = sets.map(x=>`${x.w||'–'}×${x.r||'–'}`).join('  ');
      const nm = ex.name==='BENCH_DYNAMIC' ? ('Bench ('+(s.sessionNum%2===1?'flat':'incline')+')') : ex.name;
      return `<div class="hrow"><span>${nm}</span><span>${txt}</span></div>`;
    }).join('');
    return `<div class="hcard">
      <div class="hh"><b>Session ${s.sessionNum}</b><span class="d">${ds}</span></div>
      <div class="hb">${s.bench}</div>
      ${rows}
    </div>`;
  }).join('');
}

// best working set per session for an exercise, as estimated 1RM (Epley): w * (1 + reps/30)
function seriesFor(exId){
  const pts = [];
  // history is newest-first; iterate oldest-first for a left-to-right timeline
  for(let i=history.length-1;i>=0;i--){
    const s = history[i];
    const sets = (s.logs[exId]||[]).filter(x=>x.w!==''&&x.r!=='');
    if(!sets.length) continue;
    let best=0, bw=0, br=0;
    for(const x of sets){
      const w=parseFloat(x.w)||0, r=parseFloat(x.r)||0;
      const e = w>0 ? w*(1+r/30) : r;           // bodyweight moves: rank by reps
      if(e>best){ best=e; bw=w; br=r; }
    }
    pts.push({sn:s.sessionNum, val:Math.round(best*10)/10, w:bw, r:br, date:s.date});
  }
  return pts;
}

function renderProgress(){
  // picker chips
  const picker = document.getElementById('progPicker');
  picker.innerHTML = EXERCISES.map(ex=>{
    const nm = ex.name==='BENCH_DYNAMIC' ? 'Bench' : ex.name;
    return `<div class="chip ${progSel===ex.id?'on':''}" onclick="selProg('${ex.id}')">${nm}</div>`;
  }).join('');

  const ex = EXERCISES.find(e=>e.id===progSel);
  const nm = ex.name==='BENCH_DYNAMIC' ? 'Bench' : ex.name;
  const data = seriesFor(progSel);
  const host = document.getElementById('progChart');

  if(data.length < 2){
    host.innerHTML = `<div class="empty"><span class="em">📊</span>Need at least two logged sessions for <b>${nm}</b><br>to draw a trend. Keep logging!</div>`;
    return;
  }

  // chart geometry
  const W=460, H=210, pad={l:34,r:14,t:14,b:26};
  const xs=(i)=> pad.l + (data.length===1?0:i*(W-pad.l-pad.r)/(data.length-1));
  const vals=data.map(d=>d.val);
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){ mn=mn-1; mx=mx+1; }
  const range=mx-mn; mn-=range*0.12; mx+=range*0.12;
  const ys=(v)=> pad.t + (1-(v-mn)/(mx-mn))*(H-pad.t-pad.b);

  // gridlines (3)
  let grid='';
  for(let g=0;g<=2;g++){
    const v=mn+(mx-mn)*g/2, y=ys(v);
    grid+=`<line x1="${pad.l}" y1="${y.toFixed(1)}" x2="${W-pad.r}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
    grid+=`<text x="${pad.l-6}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--mut)">${Math.round(v)}</text>`;
  }

  const linePts = data.map((d,i)=>`${xs(i).toFixed(1)},${ys(d.val).toFixed(1)}`).join(' ');
  const area = `M ${pad.l},${H-pad.b} L ${data.map((d,i)=>xs(i).toFixed(1)+','+ys(d.val).toFixed(1)).join(' L ')} L ${xs(data.length-1).toFixed(1)},${H-pad.b} Z`;

  const dots = data.map((d,i)=>{
    const lbl = (i===0||i===data.length-1) ? `<text x="${xs(i).toFixed(1)}" y="${H-pad.b+16}" text-anchor="middle" font-size="9.5" fill="var(--mut)">S${d.sn}</text>` : '';
    return `<circle cx="${xs(i).toFixed(1)}" cy="${ys(d.val).toFixed(1)}" r="${i===data.length-1?4.5:3}" fill="${i===data.length-1?'var(--accent)':'var(--accent2)'}" stroke="var(--bg)" stroke-width="1.5"/>${lbl}`;
  }).join('');

  const first=data[0].val, lastV=data[data.length-1].val;
  const delta=Math.round((lastV-first)*10)/10;
  const pct=first>0?Math.round((lastV-first)/first*1000)/10:0;
  const up=delta>=0;
  const best=Math.max(...vals);
  const unitTxt = ex.unit.includes('kg')? 'est. 1RM (kg)' : 'best rep score';

  host.innerHTML = `
    <div class="chartcard">
      <div class="ct">${nm}</div>
      <div class="cs">Strongest working set per session · ${unitTxt}</div>
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.28"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${grid}
        <path d="${area}" fill="url(#ag)"/>
        <polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}
      </svg>
      <div class="stat">
        <div class="s"><div class="v ${up?'up':''}">${up?'+':''}${delta}</div><div class="l">Change</div></div>
        <div class="s"><div class="v ${up?'up':''}">${up?'+':''}${pct}%</div><div class="l">vs start</div></div>
        <div class="s"><div class="v">${Math.round(best*10)/10}</div><div class="l">Best</div></div>
      </div>
    </div>`;
}

function selProg(id){ progSel=id; renderProgress(); }

function switchTab(t){
  document.getElementById('view-train').style.display = t==='train'?'block':'none';
  document.getElementById('view-prog').style.display  = t==='prog'?'block':'none';
  document.getElementById('view-hist').style.display  = t==='hist'?'block':'none';
  document.getElementById('tab-train').classList.toggle('on',t==='train');
  document.getElementById('tab-prog').classList.toggle('on',t==='prog');
  document.getElementById('tab-hist').classList.toggle('on',t==='hist');
  // hide the finish bar except on the Today tab
  document.querySelector('#view-train .finishbar').style.display = t==='train'?'block':'none';
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

async function resetAll(){
  if(!confirm('Delete all logged history? This cannot be undone.')) return;
  history=[];sessionNum=1;current={};lastByEx={};openEx=null;
  try{
    await window.storage.set('history',JSON.stringify([]));
    await window.storage.set('meta',JSON.stringify({sessionNum:1}));
  }catch(e){}
  render();switchTab('train');toast('History cleared');
}

load();
